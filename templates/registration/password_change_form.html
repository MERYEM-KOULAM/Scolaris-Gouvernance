{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Changer le mot de passe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card-custom { width: 100%; max-width: 500px; padding: 2rem; border-radius: 10px; border: none; }
    </style>
</head>
<body>
    <div class="card card-custom shadow bg-white">
        <h3 class="text-center mb-4 text-primary"><i class="fas fa-lock me-2"></i>Sécurité</h3>
        <p class="text-muted text-center mb-4">Choisissez un nouveau mot de passe fort.</p>

        <form method="post">
            {% csrf_token %}
            
            {% for field in form %}
            <div class="mb-3">
                <label class="form-label fw-bold">{{ field.label }}</label>
                {{ field }}
                {% if field.help_text %}
                <div class="form-text small text-muted">{{ field.help_text|safe }}</div>
                {% endif %}
                {% for error in field.errors %}
                <div class="text-danger small">{{ error }}</div>
                {% endfor %}
            </div>
            {% endfor %}

            <div class="d-grid gap-2 mt-4">
                <button type="submit" class="btn btn-primary">Enregistrer</button>
                <a href="javascript:history.back()" class="btn btn-outline-secondary">Annuler</a>
            </div>
        </form>
    </div>
    
    <script>
        // Ajoute la classe Bootstrap aux champs Django automatiquement
        var inputs = document.querySelectorAll('input');
        inputs.forEach(function(input) {
            input.classList.add('form-control');
        });
    </script>
</body>
</html>
